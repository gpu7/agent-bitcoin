services:
  bitcoind:
    image: ruimarinho/bitcoin-core:latest
    container_name: bitcoind
    ports:
      - "18443:18443"
    command:
      - "bitcoind"
      - "-regtest"
      - "-server=1"
      - "-rpcuser=btc"
      - "-rpcpassword=btc"
      - "-rpcallowip=0.0.0.0/0"
      - "-rpcbind=0.0.0.0"
      - "-printtoconsole"
      - "-zmqpubrawblock=tcp://0.0.0.0:28332"
      - "-zmqpubrawtx=tcp://0.0.0.0:28333"
      - "-txindex=1"
    volumes:
      - bitcoin-data:/home/bitcoin/.bitcoin
    networks:
      - agent-net

  lnd:
    image: lightninglabs/lnd:v0.18.5-beta
    container_name: agent-payment-decision-lnd
    depends_on:
      - bitcoind
    ports:
      - "9735:9735"
      - "10009:10009"
    command:
      - "--configfile=/home/lnd/.lnd/lnd.conf"
    volumes:
      - lnd-data:/home/lnd/.lnd
      - ./lnd-regtest.conf:/home/lnd/.lnd/lnd.conf:ro
    networks:
      - agent-net
    extra_hosts:
      - "bitcoind:172.18.0.2"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "lncli", "--lnddir=/home/lnd/.lnd", "--network=regtest", "getinfo"]
      interval: 8s
      timeout: 6s
      start_period: 30s
      retries: 20

networks:
  agent-net:
    driver: bridge

volumes:
  bitcoin-data:
  lnd-data:
