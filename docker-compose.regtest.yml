services:
  bitcoind:
    image: ruimarinho/bitcoin-core:latest
    container_name: bitcoind
    ports:
      - "18443:18443"
    environment:
      - BITCOIN_NETWORK=regtest
      - BITCOIN_RPCUSER=btc
      - BITCOIN_RPCPASSWORD=btc
      - BITCOIN_ZMQPUBRAWBLOCK=tcp://0.0.0.0:28332
      - BITCOIN_ZMQPUBRAWTX=tcp://0.0.0.0:28333
    volumes:
      - bitcoin-data:/home/bitcoin/.bitcoin
    networks:
      - agent-net

  lnd:
    image: lightninglabs/lnd:v0.18.5-beta
    container_name: agent-payment-decision-lnd
    depends_on:
      - bitcoind
    ports:
      - "9735:9735"
      - "10009:10009"
    command:
      - "--bitcoin.regtest"
      - "--bitcoin.active"
      - "--bitcoin.node=bitcoind"
      - "--bitcoind.rpcuser=btc"
      - "--bitcoind.rpcpass=btc"
      - "--bitcoind.rpchost=bitcoind:18443"
      - "--bitcoind.zmqpubrawblock=tcp://bitcoind:28332"
      - "--bitcoind.zmqpubrawtx=tcp://bitcoind:28333"
      - "--lnddir=/home/lnd/.lnd"
      - "--listen=0.0.0.0:9735"
      - "--rpclisten=0.0.0.0:10009"
    volumes:
      - lnd-data:/home/lnd/.lnd
    networks:
      - agent-net
    extra_hosts:
      - "bitcoind:172.18.0.2"   # fallback IP

networks:
  agent-net:
    driver: bridge

volumes:
  bitcoin-data:
  lnd-data:
