name: agent-bitcoin

networks:
  agent-lightning-net:
    driver: bridge

volumes:
  bitcoind-regtest-data:
  agent-x-lnd-data:
  agent-b-lnd-data:
  n8n-data:

services:
  bitcoind:
    image: ruimarinho/bitcoin-core:latest
    container_name: bitcoind
    networks:
      - agent-lightning-net
    ports:
      - "18443:18443"
      - "28332:28332"
      - "28333:28333"
    volumes:
      - bitcoind-regtest-data:/root/.bitcoin
    command: >
      bitcoind
      -regtest
      -rpcuser=rpcuser
      -rpcpassword=rpcpass
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -zmqpubrawblock=tcp://0.0.0.0:28332
      -zmqpubrawtx=tcp://0.0.0.0:28333
      -fallbackfee=0.00001000
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=rpcuser", "-rpcpassword=rpcpass", "getblockchaininfo"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  agent-x-lnd:
    image: lightninglabs/lnd:v0.20.1-beta
    container_name: agent-x-lnd
    networks:
      - agent-lightning-net
    depends_on:
      bitcoind:
        condition: service_healthy
    ports:
      - "8082:8080"
      - "9737:9735"
      - "10009:10009"
    volumes:
      - agent-x-lnd-data:/root/.lnd
    command: >
      lnd
      --bitcoin.regtest
      --bitcoin.node=bitcoind
      --bitcoind.rpcuser=rpcuser
      --bitcoind.rpcpass=rpcpass
      --bitcoind.rpchost=bitcoind
      --bitcoind.zmqpubrawblock=tcp://bitcoind:28332
      --bitcoind.zmqpubrawtx=tcp://bitcoind:28333
      --listen=0.0.0.0:9735
      --rpclisten=0.0.0.0:10009
      --restlisten=0.0.0.0:8080
      --debuglevel=info
    healthcheck:
      test: ["CMD", "lncli", "--network=regtest", "getinfo"]
      interval: 8s
      timeout: 5s
      retries: 25
      start_period: 30s

  agent-b-lnd:
    image: lightninglabs/lnd:v0.20.1-beta
    container_name: agent-b-lnd
    networks:
      - agent-lightning-net
    depends_on:
      bitcoind:
        condition: service_healthy
    ports:
      - "8083:8080"
      - "9738:9735"
      - "10010:10009"
    volumes:
      - agent-b-lnd-data:/root/.lnd
    command: >
      lnd
      --bitcoin.regtest
      --bitcoin.node=bitcoind
      --bitcoind.rpcuser=rpcuser
      --bitcoind.rpcpass=rpcpass
      --bitcoind.rpchost=bitcoind
      --bitcoind.zmqpubrawblock=tcp://bitcoind:28332
      --bitcoind.zmqpubrawtx=tcp://bitcoind:28333
      --listen=0.0.0.0:9735
      --rpclisten=0.0.0.0:10009
      --restlisten=0.0.0.0:8080
      --debuglevel=info
    healthcheck:
      test: ["CMD", "lncli", "--network=regtest", "getinfo"]
      interval: 8s
      timeout: 5s
      retries: 25
      start_period: 30s

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    networks:
      - agent-lightning-net
    depends_on:
      - agent-x-lnd
      - agent-b-lnd
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - NODE_EXTRA_CA_CERTS=/dev/null
      - NODES_EXCLUDE=[]
      - N8N_ENABLE_EXECUTE_COMMAND=true
    volumes:
      - n8n-data:/home/node/.n8n
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
