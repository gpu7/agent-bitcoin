name: agent-bitcoin

networks:
  agent-lightning-net:
    driver: bridge

volumes:
  bitcoind-regtest-data:
  agent-x-lnd-data:
  agent-b-lnd-data:
  n8n-data: 

services:
  bitcoind:
    image: ruimarinho/bitcoin-core:latest
    container_name: bitcoind
    networks:
      - agent-lightning-net
    ports:
      - "18443:18443"
      - "28332:28332"
      - "28333:28333"
    volumes:
      - bitcoind-regtest-data:/root/.bitcoin
    command: >
      bitcoind
      -regtest
      -rpcuser=rpcuser
      -rpcpassword=rpcpass
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -zmqpubrawblock=tcp://0.0.0.0:28332
      -zmqpubrawtx=tcp://0.0.0.0:28333
      -fallbackfee=0.00001000
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=rpcuser", "-rpcpassword=rpcpass", "getblockchaininfo"]
      interval: 3s
      timeout: 2s
      retries: 30
      start_period: 10s

  agent-x-lnd:
    image: lightninglabs/lnd:v0.20.1-beta
    container_name: agent-x-lnd
    networks:
      - agent-lightning-net
    depends_on:
      bitcoind:
        condition: service_healthy
    ports:
      - "8082:8080"    # REST
      - "9737:9735"    # P2P
      - "10009:10009"  # gRPC
    volumes:
      - agent-x-lnd-data:/root/.lnd

  agent-b-lnd:
    image: lightninglabs/lnd:v0.20.1-beta
    container_name: agent-b-lnd
    networks:
      - agent-lightning-net
    depends_on:
      bitcoind:
        condition: service_healthy
    ports:
      - "8083:8080"    # REST
      - "9738:9735"    # P2P
      - "10010:10009"  # gRPC
    volumes:
      - agent-b-lnd-data:/root/.lnd

  # ==================== n8n ====================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    networks:
      - agent-lightning-net
    depends_on:
      - agent-x-lnd
      - agent-b-lnd
    ports:
      - "5678:5678"                    # n8n UI
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
      - N8N_EDITOR_BASE_URL=http://localhost:5678
      # Optional: Increase memory limit for agents
      - NODE_OPTIONS=--max-old-space-size=4096
    volumes:
      - n8n-data:/home/node/.n8n
    # This allows n8n to reach agent-x-lnd and agent-b-lnd by name
